<script type="text/javascript">
    RED.nodes.registerType('ntfy-send', {
        category: 'ntfy',
        color:    '#8B5CF6',
        defaults: {
            name:     { value: '' },
            server:   { value: '', type: 'ntfy-config', required: true },
            topic:    { value: '' },
            title:    { value: '' },
            priority: { value: '' },
            tags:     { value: '' },
            click:    { value: '' },
            icon:     { value: '' },
            attach:   { value: '' },
            filename: { value: '' },
            actions:  { value: '' },
            email:    { value: '' },
            delay:    { value: '' },
            markdown: { value: false },
            cache:    { value: '' },
            firebase: { value: '' }
        },
        inputs:       1,
        outputs:      1,
        icon:         'font-awesome/fa-bell',
        paletteLabel: 'ntfy send',
        label: function () {
            return this.name || (this.topic ? `ntfy → ${this.topic}` : 'ntfy send');
        },
        labelStyle: function () {
            return this.name ? 'node_label_italic' : '';
        }
    });
</script>

<script type="text/html" data-help-name="ntfy-send">
    <p>Publish a message to an ntfy topic.</p>
    <p>The message body is taken from <code>msg.payload</code> unless
       <code>msg.ntfyOptions.message</code> is set.</p>
    <p>All text fields in the node editor support <b>Mustache templates</b>
       resolved against the incoming message at runtime.
       Example: set <i>Topic</i> to <code>{{payload.topic}}</code>.</p>

    <h3>Runtime override — msg.ntfyOptions</h3>
    <p>Set <code>msg.ntfyOptions</code> on the incoming message to override any
       node config field at runtime. All fields are optional and take priority
       over node editor settings.</p>
    <pre>
msg.ntfyOptions = {
    // Core
    topic:    "alerts",
    message:  "Hello",      // overrides msg.payload
    title:    "My title",
    priority: 4,            // 1–5 or min/low/default/high/urgent/max
    tags:     ["warning"],  // array or comma-separated string

    // Formatting
    markdown: true,

    // Actions
    click:    "https://...",
    icon:     "https://...",
    actions:  "view, Open, https://...",  // string or object array

    // Attachment (URL only)
    attach:   "https://...",
    filename: "photo.jpg",

    // Scheduling
    delay:    "30min",

    // Forwarding
    email:    "you@example.com",

    // Advanced
    cache:    "no",
    firebase: "no",
    id:       "msg-id"  // for updating/deleting existing messages
};</pre>

    <h3>Action buttons as array</h3>
    <pre>
msg.ntfyOptions.actions = [
    { action: "view",  label: "Open",    url: "https://example.com" },
    { action: "http",  label: "Approve", url: "https://api.example.com/approve",
      method: "POST",  clear: true }
];</pre>

    <h3>Output</h3>
    <p>On success the original message passes through with
       <code>msg.ntfyResponse</code> set to the parsed JSON response from
       the ntfy server.</p>

    <h3>Status</h3>
    <ul>
        <li><b>Blue dot</b> — sending</li>
        <li><b>Green dot</b> — sent successfully (shows HTTP status code)</li>
        <li><b>Red dot</b> — error (check the debug panel)</li>
    </ul>
</script>
